    \x3cscript>\
        var state = { \
            currentUser: null,\
            adminUsers: [], adminProducts: [], outlets: [], adminInjectOutlets: [], adminInjectStock: [], stokisMaster: [], stokisStock: [], rawData: []\
        };\
\
        document.addEventListener('DOMContentLoaded', function() {\
            var splash = document.getElementById('splashScreen');\
            if(splash) {\
                setTimeout(function(){ \
                    splash.style.opacity = '0'; \
                    setTimeout(function(){ splash.style.display = 'none'; }, 500); \
                    document.getElementById('loginScreen').style.display = 'flex';\
                }, 1000); \
            }\
            var pwdInput = document.getElementById('password');\
            if(pwdInput) {\
                pwdInput.addEventListener('keypress', function(e) {\
                    if(e.keyCode === 13 || e.key === 'Enter') handleLogin();\
                });\
            }\
        });\
\
        function showLoader(show, text) {\
            var loader = document.getElementById('globalLoader'); if(!loader) return;\
            loader.style.display = show ? 'flex' : 'none';\
            document.getElementById('loaderText').textContent = text || 'Memproses...';\
        }\
        \
        function closeLoader() { \
            var loader = document.getElementById('globalLoader'); if(loader) loader.style.display='none'; \
        }\
        \
        function showMessage(title, msg) {\
            closeLoader(); \
            document.getElementById('alertTitle').innerHTML = title; \
            document.getElementById('alertMessage').innerText = msg;\
            var c = document.getElementById('alertActions');\
            c.innerHTML = '\x3cbutton onclick=\"document.getElementById(\\'customAlert\\').style.display=\\'none\\'\" class=\"w-full py-2.5 rounded-xl bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 transition shadow-md\">Tutup\x3c\\/button>';\
            document.getElementById('customAlert').style.display = 'flex';\
        }\
\
        \
        \
        \
        \
        function handleLogin() {\
            var u = document.getElementById('username').value.trim();\
            var p = document.getElementById('password').value.trim();\
            if(!u || !p) return showMessage(\"Peringatan\", \"Username dan Password wajib diisi!\");\
            \
            showLoader(true, \"Memverifikasi akun...\");\
\
            if (typeof google !== 'undefined' && google.script && google.script.run) {\
                google.script.run\
                    .withSuccessHandler(function(res) {\
                        closeLoader();\
                        if (res && res.success === true) {\
                            state.currentUser = res.user;\
                            processDataLoad();\
                        } else {\
                            showMessage(\"Gagal\", (res && res.message) ? res.message : \"Data tidak valid atau server bermasalah.\");\
                        }\
                    })\
                    .withFailureHandler(function(err) {\
                        closeLoader();\
                        showMessage(\"Error Server\", \"Terjadi kegagalan koneksi: \" + err.message);\
                    })\
                    .attemptLogin(u, p);\
            } else {\
                closeLoader();\
                showMessage(\"Sistem Berjalan di Luar Server\", \"Aplikasi ini sepenuhnya menggunakan data riil. Harap deploy dan jalankan melalui Google Apps Script agar terhubung ke Spreadsheet.\");\
            }\
        }\
\
        \
        function processDataLoad() {\
            document.getElementById('userNameDisplay').textContent = state.currentUser.username;\
            document.getElementById('userRoleBadge').textContent = state.currentUser.role;\
            \
            showLoader(true, \"Menarik Data Master Dasar...\");\
\
            if (typeof google !== 'undefined' && google.script && google.script.run) {\
                \
                google.script.run\
                    .withSuccessHandler(function(resStatic) {\
                        if (resStatic && resStatic.success === true) {\
                            if (resStatic.appName) {
                                document.title = resStatic.appName;
                                document.querySelectorAll('.app-title-dynamic').forEach(el => el.innerText = resStatic.appName);
                            }
                            state.adminUsers = resStatic.users || [];\
                            state.outlets = resStatic.outlets || [];\
                            state.stokisMaster = resStatic.stokisMaster || [];\
                            \
                            showLoader(true, \"Menarik Data Transaksi & Stok...\");\
                            \
                            \
                            google.script.run\
                                .withSuccessHandler(function(resDyn) {\
                                    closeLoader();\
                                    if (resDyn && resDyn.success === true) {\
                                        state.adminProducts = resDyn.products || [];\
                                        state.adminInjectOutlets = resDyn.injectOutlets || [];\
                                        state.adminInjectStock = resDyn.injectStock || [];\
                                        state.stokisStock = resDyn.stokisStock || [];\
                                        state.rawData = resDyn.rawData || [];\
                                        finishLoginRouting();\
                                    } else {\
                                        showMessage(\"Gagal Sinkronisasi Transaksi\", resDyn.message || \"Gagal memuat data dinamis.\");\
                                    }\
                                })\
                                .withFailureHandler(function(err) {\
                                    closeLoader(); showMessage(\"Error Server\", err.message);\
                                })\
                                .fetchDynamicData();\
\
                        } else {\
                            closeLoader();\
                            showMessage(\"Gagal Sinkronisasi Master\", resStatic.message || \"Gagal memuat Master.\");\
                        }\
                    })\
                    .withFailureHandler(function(err) {\
                        closeLoader();\
                        showMessage(\"Error Server\", \"Gagal mengunduh data: \" + err.message);\
                    })\
                    .fetchStaticMaster();\
            } else {\
                closeLoader();\
            }\
        }\
\
        function finishLoginRouting() {\
            document.getElementById('loginScreen').style.display = 'none'; \
            document.getElementById('mainContent').style.display = 'flex';\
\
            if(state.currentUser.role === 'Admin' || state.currentUser.role === 'Super Admin') {\
                document.body.classList.add('admin-desktop');\
                switchTab('AdminPanel');\
                switchAdminTab('Dashboard');\
                startAutoSync(); \
            } else {\
                document.body.classList.remove('admin-desktop');\
                switchTab('Sales');\
                startAutoSync(); \
            }\
        }\
\
        \
        var autoSyncInterval = null;\
        function startAutoSync() {\
            if (autoSyncInterval) clearInterval(autoSyncInterval);\
            autoSyncInterval = setInterval(function() {\
                if (typeof google !== 'undefined' && google.script && google.script.run && state.currentUser) {\
                    google.script.run.withSuccessHandler(function(res) {\
                        if (res && res.success === true) {\
                            state.adminProducts = res.products || [];\
                            state.adminInjectOutlets = res.injectOutlets || [];\
                            state.adminInjectStock = res.injectStock || [];\
                            state.stokisStock = res.stokisStock || [];\
                            state.rawData = res.rawData || [];\
                            \
                            var activeTab = document.querySelector('.active-admin-nav');\
                            if(activeTab) {\
                                var sectionId = activeTab.id.replace('navAdmin', '');\
                                switchAdminTab(sectionId); \
                            } else {\
                                \
                                if(!document.getElementById('tabSales').classList.contains('hidden')) renderSalesOutlets();\
                                if(!document.getElementById('tabStock').classList.contains('hidden')) renderSalesStock();\
                                if(!document.getElementById('tabHistory').classList.contains('hidden')) renderSalesHistory();\
                                if(!document.getElementById('tabReport').classList.contains('hidden')) renderSalesReport();\
                            }\
                        }\
                    }).fetchDynamicData();\
                }\
            }, 15000); \
        }\
\
        \
        \
        \
\
        function switchTab(tabId) {\
            if(state.currentUser && state.currentUser.role === 'Sales') {\
                document.querySelectorAll('.tab-content').forEach(t => { t.classList.add('hidden'); t.classList.remove('block'); });\
                document.querySelectorAll('.sales-only').forEach(b => { b.classList.remove('text-blue-600'); b.classList.add('text-gray-400'); });\
                var target = document.getElementById('tab' + tabId); \
                if(target) { target.classList.remove('hidden'); target.classList.add('block'); }\
                var btn = document.getElementById('nav' + tabId);\
                if(btn) { btn.classList.add('text-blue-600'); btn.classList.remove('text-gray-400'); }\
\
                if(tabId === 'Sales') renderSalesOutlets(); \
                if(tabId === 'Stock') renderSalesStock();\
                if(tabId === 'History') renderSalesHistory();\
                if(tabId === 'Report') renderSalesReport();\
            } else if (state.currentUser && (state.currentUser.role === 'Admin' || state.currentUser.role === 'Super Admin')) {\
                document.querySelectorAll('.tab-content').forEach(t => { t.classList.add('hidden'); t.classList.remove('block'); });\
                document.getElementById('tabAdminPanel').classList.remove('hidden');\
                document.getElementById('tabAdminPanel').classList.add('flex');\
            }\
        }\
\
        function switchAdminTab(sectionId) {\
            document.querySelectorAll('.admin-only.nav-btn').forEach(btn => {\
                btn.classList.remove('active-admin-nav');\
                var icon = btn.querySelector('i');\
                if(icon) { icon.classList.remove('text-blue-400', 'text-cyan-400'); icon.classList.add('text-gray-400'); }\
            });\
\
            var activeBtn = document.getElementById('navAdmin' + sectionId);\
            if(activeBtn) {\
                activeBtn.classList.add('active-admin-nav');\
                var activeIcon = activeBtn.querySelector('i');\
                if(activeIcon) { activeIcon.classList.remove('text-gray-400'); activeIcon.classList.add('text-blue-400'); }\
            }\
\
            document.querySelectorAll('.admin-section').forEach(sec => { sec.classList.add('hidden'); sec.classList.remove('block', 'flex', 'flex-col', 'xl:flex-row'); });\
\
            var targetSec = document.getElementById('adminSec' + sectionId);\
            if(targetSec) {\
                targetSec.classList.remove('hidden');\
                if (['InjectOutlets'].includes(sectionId)) {\
                    targetSec.classList.add('flex', 'flex-col', 'xl:flex-row');\
                } else if (['RawData', 'LogGudang', 'Settings', 'StockStokis', 'SystemHealth', 'StockGudang', 'Products', 'Users', 'Outlets', 'InjectStock'].includes(sectionId)) {\
                    targetSec.classList.add('flex', 'flex-col');\
                } else {\
                    targetSec.classList.add('block');\
                }\
            }\
\
            if(sectionId === 'Dashboard') document.getElementById('dashTotalProd').textContent = state.adminProducts.length;\
            \
            if(sectionId === 'Users') {\
                renderTable('tableBodyUsers', state.adminUsers, u => `\
                    \x3ctr class=\"bg-white hover:bg-gray-50\">\
                        \x3ctd class=\"font-bold text-xs\">${u.Username||u.username}\x3c\\/td>\
                        \x3ctd class=\"text-xs\">${u.Role||u.role}\x3c\\/td>\
                        \x3ctd class=\"font-mono text-gray-400 text-xs\">\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\x3c\\/td>\
                        \x3ctd class=\"text-center\">\
                            \x3cbutton onclick=\"openFormUser('${u.ID||u.id}', '${u.Username||u.username}', '${u.Role||u.role}', '${u.Password||u.password}')\" class=\"text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 w-8 h-8 rounded-lg transition mr-1\" title=\"Edit\">\x3ci class=\"fas fa-edit\">\x3c\\/i>\x3c\\/button>\
                            \x3cbutton onclick=\"deleteUserDb('${u.ID||u.id}', '${u.Username||u.username}')\" class=\"text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 w-8 h-8 rounded-lg transition\" title=\"Hapus\">\x3ci class=\"fas fa-trash\">\x3c\\/i>\x3c\\/button>\
                        \x3c\\/td>\
                    \x3c\\/tr>\
                `);\
            }\
            \
            if(sectionId === 'Products') {\
                renderTable('tableBodyProducts', state.adminProducts, p => `\
                    \x3ctr class=\"bg-white hover:bg-gray-50\">\
                        \x3ctd class=\"font-bold uppercase text-xs\">${p.Name||p.name}\x3c\\/td>\
                        \x3ctd class=\"text-xs\">${p.PriceRetail||p.priceRetail||0}\x3c\\/td>\
                        \x3ctd class=\"text-xs\">${p.PriceWholesale||p.priceWholesale||0}\x3c\\/td>\
                        \x3ctd class=\"text-center\">\
                            \x3cbutton onclick=\"openFormProduct('${p.ID||p.id}', '${p.Name||p.name}', '${p.PriceRetail||p.priceRetail||0}', '${p.PriceWholesale||p.priceWholesale||0}', '${p.Stock||p.stock||0}')\" class=\"text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 w-8 h-8 rounded-lg transition mr-1\" title=\"Edit\">\x3ci class=\"fas fa-edit\">\x3c\\/i>\x3c\\/button>\
                            \x3cbutton onclick=\"deleteProductDb('${p.ID||p.id}')\" class=\"text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 w-8 h-8 rounded-lg transition\" title=\"Hapus\">\x3ci class=\"fas fa-trash\">\x3c\\/i>\x3c\\/button>\
                        \x3c\\/td>\
                    \x3c\\/tr>\
                `);\
            }\
            \
            if(sectionId === 'Outlets') renderTable('tableBodyOutlets', state.outlets, o => `\x3ctr>\x3ctd class=\"font-bold text-xs\">${o.Name||o.name}\x3c\\/td>\x3ctd class=\"text-xs\">${o.Address||o.address}\x3c\\/td>\x3ctd class=\"text-xs\">${o.Type||o.type}\x3c\\/td>\x3c\\/tr>`);\
            \
            if(sectionId === 'StockGudang') {\
                renderTable('tableBodyStockGudang', state.adminProducts, p => `\
                    \x3ctr class=\"bg-white hover:bg-gray-50\">\
                        \x3ctd class=\"font-bold uppercase text-xs\">${p.Name||p.name}\x3c\\/td>\

        function getGeotag() {\
            if (navigator.geolocation) {\
                document.getElementById('btnGeotag').innerHTML = '\x3ci class=\"fas fa-spinner fa-spin mr-1\">\x3c\\/i> Mendapatkan lokasi...';\
                navigator.geolocation.getCurrentPosition(function(position) {\
                    var lat = position.coords.latitude.toFixed(5);\
                    var lon = position.coords.longitude.toFixed(5);\
                    var geo = lat + \", \" + lon;\
                    document.getElementById('nooGeotagVal').value = geo;\
                    var btn = document.getElementById('btnGeotag');\
                    btn.innerHTML = '\x3ci class=\"fas fa-check text-green-500 mr-1\">\x3c\\/i> Lokasi Tersimpan (' + geo + ')';\
                    btn.classList.replace('text-red-600', 'text-green-600');\
                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`).then(r=>r.json()).then(d=>{if(d&&d.display_name){var a=document.getElementById('nooAddress');a.value=a.value?a.value+', '+d.display_name:d.display_name;}}).catch(e=>console.log(e));\
                }, function(error) {\
                    document.getElementById('btnGeotag').innerHTML = '\x3ci class=\"fas fa-exclamation-triangle mr-1\">\x3c\\/i> Gagal ambil lokasi. Coba lagi.';\
                    showMessage('Error Geotag', 'Pastikan izin lokasi (GPS) diaktifkan di browser\/HP Anda.');\
                }, {enableHighAccuracy: true, timeout: 10000, maximumAge: 0});\
            } else {\
                showMessage('Error', 'Browser Anda tidak mendukung Geotagging.');\
            }\
        }\
